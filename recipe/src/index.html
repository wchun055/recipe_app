<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Recipe Vault Pro</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <h2>Cookbook</h2>
            <button id="view-all-btn" class="nav-btn">📂 My Collection</button>
            <button id="add-btn" class="btn-p">+ New Recipe</button>
        </nav>

        <main class="main-area">
            <div id="grid-view">
                <div id="recipe-grid" class="grid-container"></div>
            </div>

            <div id="editor-view" class="view-section" style="display: none;">
                <div class="recipe-card">
                    <div class="card-header">
                        <input type="text" id="title" placeholder="Recipe Title..." class="title-input">
                        <div class="card-actions">
                            <button id="edit-mode-btn" class="btn-p" style="display: none;">Edit Recipe</button>
                            <button id="save-btn" class="btn-p">Save</button>
                            <button id="delete-btn" class="btn-d">Delete</button>
                        </div>
                    </div>

                    <div class="card-body">
                        <div class="photo-area">
                            <img id="prev-img" src="https://via.placeholder.com/150">
                            <button id="upload-btn" class="btn-s">Change Image</button>
                        </div>

                        <div class="tabs">
                            <div class="tab active" data-tab="about">About</div>
                            <div class="tab" data-tab="ingredients">Ingredients</div>
                            <div class="tab" data-tab="instructions">Instructions</div>
                        </div>

                        <div id="about" class="content active">
                            <textarea id="txt-about" placeholder="Describe your dish..."></textarea>
                        </div>

                        <div id="ingredients" class="content">
                            <div id="ingredients-list"></div>
                            <button id="add-ingredient-btn" class="btn-s">+ Add Ingredient</button>
                        </div>

                        <div id="instructions" class="content">
                            <div id="instructions-list"></div>
                            <button id="add-step-btn" class="btn-s">+ Add Step</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
